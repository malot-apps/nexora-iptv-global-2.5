# Simple workflow for deploying static content to GitHub Pages
name: Deploy Static Content to Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]

  # Allows manual runs from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Website
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_ACTIONS: "true"

      - name: Verify Build Output Directory
        run: |
          echo "==== Current Workspace Directory List ===="
          ls -la
          echo "==== Verifying output folder exists ===="
          if [ -d "./out" ]; then
            echo "Directory ./out exists! Listing contents:"
            ls -la ./out
          else
            echo "Error: ./out directory does not exist!"
            exit 1
          fi

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
